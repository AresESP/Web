<!DOCTYPE html>
<html>
  <head>
    <title>Mi página</title>

    <!-- Meta -->
    <meta name="title" content="Mi página" />
    <meta name="description" content="Portafolio de desarrollador web" />
    <meta name="keywords" content="Desarrollador Web, CSS, HTML, JavaScript" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="language" content="Spanish" />
    <meta name="author" content="Ares Caamaño Martínez" />

    <!-- Styles -->
    <link rel="stylesheet" href="/css/normalize.css" />
    <link rel="stylesheet" href="/css/stylesheet.css" />
    <link rel="stylesheet" href="/css/media.css" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/vnd.microsoft.icon"
      href="/assets/media/images/favicon.ico"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap"
      rel="stylesheet"
    />

    <!-- Scripts -->
    <script src="/js/scripts.js"></script>
  </head>

  <body>
    <video autoplay muted loop id="body__video">
      <source src="/assets/media/videos/Lines-5227.mp4" type="video/mp4" />
    </video>

    <div id="body__leftdiv">
      <nav>
        <a href=".."
          ><img src="/assets/media/images/favicon.ico" alt="Logo"
        /></a>

        <div id="body__leftdiv-div">
          <a href="#home" class="body__leftdiv-nav-ul-li-a">Inicio</a>

          <a href="#about" class="body__leftdiv-nav-ul-li-a">Sobre mí</a>

          <a href="#portfolio" class="body__leftdiv-nav-ul-li-a">Portafolio</a>

          <a href="#contact" class="body__leftdiv-nav-ul-li-a">Contacto</a>
        </div>

        <a href="https://github.com/AresESP" target="_blank"
          ><img
            src="/assets/media/images/GitHub-Mark/PNG/GitHub-Mark-32px.png"
            alt="Github"
        /></a>
      </nav>
    </div>

    <div id="body__rightdiv">
      <header id="home">
        <div id="header__div">
          <h1 class="title">Ares,<br /><span>D</span>esarrollador Web</h1>
        </div>
      </header>

      <main>
        <article id="about" class="main__article">
          <h2 class="title">Sobre mí</h2>

          <div class="article__div">

            <div id="article__div-textdiv">
              <p>
                Vivo en una bonita ciudad en Galicia, España.<br />
                Soy un aprendiz de desarrollador webs.<br />
                Me encanta aprender y colaborar con otros para hacer grandes
                cosas.<br />
                Mira mis trabajos o contáctame más abajo.
              </p>              
            </div>

            <div class="article__div-imgdiv" id="aboutimg"></div>

          </div>
        </article>

        <article id="portfolio" class="main__article">
          <h2 class="title">Mis trabajos</h2>

          <div id="portfolio__div" class="article__div">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </article>

        <article id="contact" class="main__article">
          <h2 class="title">Contacto</h2>

          <div class="article__div">
            <div>
              <form id="contact__form" action="https://formspree.io/f/moqronqz" method="post">
                <div>
                  <input name="name" type="text" placeholder="Nombre" class="contact__input contact__div-input" required>
                  <input name="email" type="email" placeholder="Email" class="contact__input contact__div-input" required>                  
                </div>

                <input name="subject" type="text" placeholder="Asunto" class="contact__input" required>
                <textarea name="message" placeholder="Mensaje" class="contact__input" required></textarea>

                <input type="submit" value="Enviar" id="contact__submit">
              </form> 
            </div>
  
            <div class="article__div-imgdiv" id="contactimg"></div>
          </div>
        </article>
      </main>
    </div>
  </body>
</html>
